<form id="filter-form" method="get" class="flex items-center bg-white border border-gray-300 rounded-md shadow-sm focus-within:ring-1 focus-within:ring-gray-400 focus-within:border-gray-400 w-full sm:w-auto transition-shadow" x-data="filterBar()">
    <!-- Unified Search Field -->
    <div class="flex items-center pl-3 pr-2 text-gray-400">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd" />
        </svg>
    </div>
    <input type="text" name="q" placeholder="{{ search_placeholder|default:'Search...' }}" value="{{ request.GET.q }}" class="flex-grow py-2 pr-3 border-none focus:ring-0 text-sm bg-transparent outline-none w-[220px]" @keydown.enter.prevent="submitForm">

    <div class="w-px h-6 bg-gray-200 mx-1"></div>

    <!-- Filter Dropdown -->
    <div class="relative" x-data="{ open: false }">
        <button @click.prevent="open = !open" type="button" class="flex items-center gap-1 px-3 py-2 text-sm text-gray-700 hover:text-gray-900 hover:bg-gray-50 transition-colors font-medium h-full">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" />
            </svg>
            <span class="hidden sm:inline">Filters</span>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
            </svg>
        </button>
        
        <!-- Filter Menu -->
        <div x-show="open" @click.away="open = false" style="display: none;" class="absolute right-0 top-full mt-2 w-72 bg-white rounded-xl shadow-xl border border-gray-100 z-50 overflow-hidden transform origin-top-right transition-all">
            <div class="bg-gray-50 px-4 py-3 border-b border-gray-100 flex justify-between items-center">
                <h3 class="text-sm font-semibold text-gray-700">Custom Filters</h3>
                <a href="?" class="text-xs text-red-500 hover:text-red-700 font-medium">Clear All</a>
            </div>
            <div class="p-4 space-y-4">
                {% if model_name == 'Customer' %}
                <div>
                    <label class="block text-xs font-semibold tracking-wide text-gray-500 uppercase mb-1">Has Sales</label>
                    <select name="has_sales" class="form-select text-sm w-full border-gray-300 rounded-md focus:ring-gray-400 focus:border-gray-400 px-3 py-2" @change="submitForm">
                        <option value="">Any</option>
                        <option value="true" {% if request.GET.has_sales == 'true' %}selected{% endif %}>Yes</option>
                        <option value="false" {% if request.GET.has_sales == 'false' %}selected{% endif %}>No</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold tracking-wide text-gray-500 uppercase mb-1">Customer Type</label>
                    <select name="customer_type" class="form-select text-sm w-full border-gray-300 rounded-md focus:ring-gray-400 focus:border-gray-400 px-3 py-2" @change="submitForm">
                        <option value="">Any</option>
                        <option value="Retail" {% if request.GET.customer_type == 'Retail' %}selected{% endif %}>Retail</option>
                        <option value="Wholesale" {% if request.GET.customer_type == 'Wholesale' %}selected{% endif %}>Wholesale</option>
                    </select>
                </div>
                {% elif model_name == 'Invoice' or model_name == 'Quotation' %}
                <div>
                    <label class="block text-xs font-semibold tracking-wide text-gray-500 uppercase mb-1">Status</label>
                    <select name="status" class="form-select text-sm w-full border-gray-300 rounded-md focus:ring-gray-400 focus:border-gray-400 px-3 py-2" @change="submitForm">
                        <option value="">Any Status</option>
                        <option value="DRAFT" {% if request.GET.status == 'DRAFT' %}selected{% endif %}>Draft</option>
                        <option value="ISSUED" {% if request.GET.status == 'ISSUED' %}selected{% endif %}>Issued</option>
                        <option value="CANCELLED" {% if request.GET.status == 'CANCELLED' %}selected{% endif %}>Cancelled</option>
                        {% if model_name == 'Invoice' %}
                        <option value="PAID" {% if request.GET.status == 'PAID' %}selected{% endif %}>Paid</option>
                        {% endif %}
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold tracking-wide text-gray-500 uppercase mb-1">Date From</label>
                    <input type="date" name="date_from" class="form-input text-sm w-full border-gray-300 rounded-md focus:ring-gray-400 focus:border-gray-400 px-3 py-2" value="{{ request.GET.date_from }}" @change="submitForm">
                </div>
                <div>
                    <label class="block text-xs font-semibold tracking-wide text-gray-500 uppercase mb-1">Date To</label>
                    <input type="date" name="date_to" class="form-input text-sm w-full border-gray-300 rounded-md focus:ring-gray-400 focus:border-gray-400 px-3 py-2" value="{{ request.GET.date_to }}" @change="submitForm">
                </div>
                {% endif %}
            </div>
            <div class="px-4 py-3 bg-gray-50 border-t border-gray-100 flex gap-2">
                <button type="button" @click="submitForm" class="flex-1 bg-gray-800 hover:bg-gray-900 text-white text-sm font-medium py-2 rounded-md shadow-sm transition-colors">Apply Filters</button>
            </div>
        </div>
    </div>

    <div class="w-px h-6 bg-gray-200 mx-1"></div>

    <!-- Favorites Dropdown -->
    <div class="relative" x-data="{ openFavorites: false }">
        <button @click.prevent="openFavorites = !openFavorites" type="button" class="flex items-center gap-1 px-3 py-2 text-sm text-gray-700 hover:text-yellow-600 hover:bg-yellow-50 transition-colors font-medium rounded-r-md h-full">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-yellow-500" viewBox="0 0 20 20" fill="currentColor">
                <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
            </svg>
            <span class="hidden sm:inline">Favorites</span>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
            </svg>
        </button>
        
        <!-- Favorites Menu -->
        <div x-show="openFavorites" @click.away="openFavorites = false" style="display: none;" class="absolute right-0 top-full mt-2 w-72 bg-white rounded-xl shadow-xl border border-gray-100 z-50 overflow-hidden transform origin-top-right transition-all">
            <div class="px-4 py-3 bg-gray-50 border-b border-gray-100 flex items-center gap-2">
                <h3 class="text-sm font-semibold text-gray-700">Saved Searches</h3>
            </div>
            <div class="py-1 max-h-64 overflow-y-auto">
                {% for sf in saved_filters %}
                <div class="flex items-center justify-between px-4 py-2 hover:bg-gray-50 group">
                    <a href="?{{ sf.query_string }}" class="flex-grow text-sm text-gray-800 font-medium truncate pr-2">{{ sf.name }}</a>
                    <button type="button" @click.prevent="deleteFilter({{ sf.id }})" class="text-red-400 hover:text-red-600 transition-colors" title="Delete">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                    </button>
                </div>
                {% empty %}
                <div class="px-4 py-6 flex flex-col items-center justify-center text-center text-gray-500">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-gray-300 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" />
                    </svg>
                    <p class="text-sm">No saved searches yet</p>
                </div>
                {% endfor %}
            </div>
            <div class="px-4 py-3 bg-gray-50 border-t border-gray-100">
                <button type="button" @click.prevent="promptSaveFilter" class="w-full text-sm text-center text-indigo-600 hover:text-indigo-800 font-semibold flex items-center justify-center gap-1 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
                    </svg> Save Current Search
                </button>
            </div>
        </div>
    </div>
</form>

<script>
    function filterBar() {
        return {
            submitForm() {
                // Remove empty fields automatically
                const form = document.getElementById('filter-form');
                const formData = new FormData(form);
                const params = new URLSearchParams();
                for (const [key, value] of formData.entries()) {
                    if (value) params.append(key, value);
                }
                window.location.search = params.toString();
            },
            promptSaveFilter() {
                const name = prompt("Enter a name for this fast filter combination:");
                if (!name) return;
                
                const qs = window.location.search.replace('?', '');
                fetch("{% url 'save_filter' %}", {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': '{{ csrf_token }}'
                    },
                    body: JSON.stringify({
                        model_name: '{{ model_name }}',
                        name: name,
                        query_string: qs
                    })
                }).then(res => res.json()).then(data => {
                    if(data.status === 'success') {
                        window.location.reload();
                    } else {
                        alert(data.message || 'Error saving filter');
                    }
                });
            },
            deleteFilter(id) {
                if(!confirm("Are you sure you want to remove this saved search?")) return;
                fetch(`/users/filter/${id}/delete/`, {
                    method: 'POST',
                    headers: {
                        'X-CSRFToken': '{{ csrf_token }}'
                    }
                }).then(res => res.json()).then(data => {
                    if(data.status === 'success') {
                        window.location.reload();
                    }
                });
            }
        }
    }
</script>
